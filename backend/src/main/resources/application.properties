spring.application.name=smartcampus
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.hikari.maximum-pool-size=${APP_DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${APP_DB_POOL_MIN_IDLE:0}
spring.datasource.hikari.idle-timeout=${APP_DB_POOL_IDLE_TIMEOUT_MS:60000}
spring.datasource.hikari.max-lifetime=${APP_DB_POOL_MAX_LIFETIME_MS:600000}
spring.datasource.hikari.keepalive-time=${APP_DB_POOL_KEEPALIVE_TIME_MS:120000}
spring.datasource.hikari.connection-timeout=${APP_DB_POOL_CONNECTION_TIMEOUT_MS:10000}
spring.datasource.hikari.validation-timeout=${APP_DB_POOL_VALIDATION_TIMEOUT_MS:3000}
spring.servlet.multipart.max-file-size=${APP_TICKET_ATTACHMENT_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${APP_TICKET_ATTACHMENT_MAX_REQUEST_SIZE:10MB}
spring.flyway.enabled=true
spring.flyway.schemas=public
spring.flyway.default-schema=public
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

app.auth.delivery.mode=${APP_AUTH_DELIVERY_MODE:supabase}
app.auth.supabase.url=${NEXT_PUBLIC_SUPABASE_URL:}
app.auth.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
app.auth.supabase.invite-redirect-to=${APP_AUTH_INVITE_REDIRECT_TO:http://localhost:3000/auth/callback?flow=invite}
app.auth.supabase.magic-link-redirect-to=${APP_AUTH_MAGIC_LINK_REDIRECT_TO:http://localhost:3000/auth/callback?flow=magiclink}
app.auth.supabase.password-recovery-redirect-to=${APP_AUTH_PASSWORD_RECOVERY_REDIRECT_TO:http://localhost:3000/auth/callback?flow=recovery}
app.auth.login-link-rate-limit.enabled=${APP_AUTH_LOGIN_LINK_RATE_LIMIT_ENABLED:true}
app.auth.login-link-rate-limit.per-ip-max-requests=${APP_AUTH_LOGIN_LINK_RATE_LIMIT_PER_IP_MAX_REQUESTS:20}
app.auth.login-link-rate-limit.per-ip-window-seconds=${APP_AUTH_LOGIN_LINK_RATE_LIMIT_PER_IP_WINDOW_SECONDS:60}
app.auth.login-link-rate-limit.per-email-max-requests=${APP_AUTH_LOGIN_LINK_RATE_LIMIT_PER_EMAIL_MAX_REQUESTS:5}
app.auth.login-link-rate-limit.per-email-window-seconds=${APP_AUTH_LOGIN_LINK_RATE_LIMIT_PER_EMAIL_WINDOW_SECONDS:300}
app.auth.login-link-rate-limit.per-email-min-interval-seconds=${APP_AUTH_LOGIN_LINK_RATE_LIMIT_PER_EMAIL_MIN_INTERVAL_SECONDS:60}
app.storage.ticket-attachments.bucket=${APP_TICKET_ATTACHMENTS_BUCKET:ticket-attachments}
app.storage.ticket-attachments.public-bucket=${APP_TICKET_ATTACHMENTS_PUBLIC:true}
app.storage.ticket-attachments.file-size-limit-bytes=${APP_TICKET_ATTACHMENTS_FILE_SIZE_LIMIT_BYTES:10485760}
app.security.jwt.issuer-uri=${APP_SECURITY_JWT_ISSUER_URI:}
app.security.jwt.local-issuer=${APP_SECURITY_JWT_LOCAL_ISSUER:http://smartcampus.local}
app.security.jwt.local-secret=${APP_SECURITY_JWT_LOCAL_SECRET:}
app.security.cors.allowed-origins=${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.booking.time-zone=${APP_BOOKING_TIME_ZONE:Asia/Colombo}

app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.full-name=${APP_BOOTSTRAP_ADMIN_FULL_NAME:}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}

app.storage.profile-images.bucket=${APP_STORAGE_PROFILE_IMAGES_BUCKET:profile-images}
app.storage.profile-images.max-size-bytes=${APP_STORAGE_PROFILE_IMAGES_MAX_SIZE_BYTES:2097152}

app.notifications.email.enabled=${APP_NOTIFICATIONS_EMAIL_ENABLED:false}
app.notifications.email.from=${APP_NOTIFICATIONS_EMAIL_FROM:no-reply@smartcampus.local}
app.notifications.email.action-base-url=${APP_NOTIFICATIONS_EMAIL_ACTION_BASE_URL:http://localhost:3000}
app.notifications.email.retry-max-attempts=${APP_NOTIFICATIONS_EMAIL_RETRY_MAX_ATTEMPTS:3}
app.notifications.email.retry-delay-seconds=${APP_NOTIFICATIONS_EMAIL_RETRY_DELAY_SECONDS:300}
app.notifications.email.batch-size=${APP_NOTIFICATIONS_EMAIL_BATCH_SIZE:25}
app.notifications.booking-reminders.fixed-delay-ms=${APP_NOTIFICATIONS_BOOKING_REMINDERS_FIXED_DELAY_MS:600000}
app.notifications.ticket-sla.fixed-delay-ms=${APP_NOTIFICATIONS_TICKET_SLA_FIXED_DELAY_MS:600000}
