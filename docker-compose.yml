services:
  backend:
    image: maven:3.9.6-eclipse-temurin-21
    working_dir: /app
    command: sh -c "sed -i 's/\r$//' /app/scripts/dev-autoreload.sh && chmod +x /app/scripts/dev-autoreload.sh && /app/scripts/dev-autoreload.sh"
    ports:
      - "8080:8080"
    environment:
      RELOAD_POLL_INTERVAL_SECONDS: "2"
      SPRING_PROFILES_ACTIVE: local
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "false"
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      APP_TICKET_ATTACHMENTS_BUCKET: ${APP_TICKET_ATTACHMENTS_BUCKET:-ticket-attachments}
      APP_TICKET_ATTACHMENTS_PUBLIC: ${APP_TICKET_ATTACHMENTS_PUBLIC:-true}
      APP_TICKET_ATTACHMENTS_FILE_SIZE_LIMIT_BYTES: ${APP_TICKET_ATTACHMENTS_FILE_SIZE_LIMIT_BYTES:-10485760}
      APP_BOOTSTRAP_ADMIN_EMAIL: ${APP_BOOTSTRAP_ADMIN_EMAIL:-}
      APP_BOOTSTRAP_ADMIN_PASSWORD: ${APP_BOOTSTRAP_ADMIN_PASSWORD:-}
      APP_BOOTSTRAP_ADMIN_FULL_NAME: ${APP_BOOTSTRAP_ADMIN_FULL_NAME:-System Admin}
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "status=$$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/health || true); [ \"$$status\" = \"200\" ]"
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 180s

  frontend:
    build: ./frontend
    command: sh -c "mkdir -p .next/dev/logs .next/dev/types .next/types && npm run dev"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      INTERNAL_API_URL: http://backend:8080
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
